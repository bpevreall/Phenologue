name: Deploy — dev

# Manual-only until repository secrets CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID are configured. Run via "Actions → Deploy — dev →
# Run workflow" once secrets are in place. Until then the maintainer deploys
# manually with `npx wrangler deploy --env dev` etc.
on:
  workflow_dispatch:

jobs:
  worker-dev:
    name: Worker → dev
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run db:migrate:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npm run deploy:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  pages-dev:
    name: Pages → dev
    runs-on: ubuntu-latest
    needs: worker-dev
    defaults:
      run:
        working-directory: pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pages/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run deploy:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
