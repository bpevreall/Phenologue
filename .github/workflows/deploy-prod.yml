name: Deploy — prod

# Triggered by version tags (e.g. `v0.1.0`). Requires repository secrets
# CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to be configured, and the
# `production` environment to exist in repository settings. Until that's set
# up the maintainer deploys manually with `npx wrangler deploy --env prod`.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  worker-prod:
    name: Worker → prod
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run db:migrate:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npm run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  pages-prod:
    name: Pages → prod
    runs-on: ubuntu-latest
    environment: production
    needs: worker-prod
    defaults:
      run:
        working-directory: pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pages/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
